server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  application:
    name: ai-plus-rag

# DeepSeek LLM Configuration (OpenAI compatible)
langchain4j:
  open-ai:
    chat-model:
      # base-url: https://api.deepseek.com
      base-url: https://tokenhub.tencentmaas.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      model-name: deepseek-v4-flash
      temperature: 0.7
      max-tokens: 2048

# Embedding Model Configuration
rag:
  embedding:
    type: ollama
    timeout-seconds: 60
    ollama:
      base-url: http://localhost:11434
      # 常用 Ollama Embedding 模型:
      #   nomic-embed-text     (轻量推荐，~274MB, 768维)
      #   mxbai-embed-large   (质量更高，~670MB, 1024维)
      #   all-minilm           (经典小模型)
      # 使用前需先执行: ollama pull nomic-embed-text
      model-name: nomic-embed-text
    # 远程 API 配置（备用方案）
    # 本地 ONNX 配置（内置模型，首次下载较慢）
    local:
      model: all-MiniLM-L6-v2

  # RAG Retrieval Parameters
  retrieval:
    top-k: 8
    min-score: 0.25

  # Document Splitting Parameters
  splitting:
    max-segment-size: 500
    overlap: 50

  # 向量化批处理参数
  vectorization:
    batch-size: 5

  # PostgreSQL + pgvector 向量存储配置
  vector:
    pgvector:
      host: localhost
      port: 5432
      database: rag
      user: postgres
      password: ${PGVECTOR_PASSWORD:liang}
      table: document_embeddings
      use-index: false
      index-list-size: 100
      drop-table-first: true  # 切换模型时需重建表（维度变化 1024->768）

# Logging
logging:
  level:
    com.aiplus.rag: DEBUG
    dev.langchain4j: INFO
